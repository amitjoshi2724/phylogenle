<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phylogenle - The Evolutionary Wordle</title>
    <meta name="description" content="Guess the organism based on evolutionary distance and taxonomic rank.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>PHYLOGENLE</h1>
            <p class="subtitle">Guess the organism by evolutionary distance</p>
        </header>

        <main class="main-layout">
            <div class="left-panel">
                <div class="input-section">
                    <div class="autocomplete-wrapper">
                        <input type="text" id="animal-input" placeholder="Enter an organism..." autocomplete="off">
                        <ul id="autocomplete-list" class="autocomplete-list"></ul>
                    </div>
                    <button id="guess-btn" class="primary-btn">Guess</button>
                </div>
                
                <div class="guesses-container" id="guesses-container">
                    <!-- Guesses will appear here -->
                </div>
                
                <div class="credits-section" style="margin: 15px 0 10px 0; display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                    <div style="display: flex; flex-direction: column; gap: 2px;">
                        <span style="font-size: 0.85rem; color: #555;">Developed by <strong>Amit Joshi</strong></span>
                        <a href="https://github.com/amitjoshi2724" target="_blank"
                            style="color: #0366d6; text-decoration: none; font-size: 0.8rem;">GitHub: @amitjoshi2724</a>
                    </div>
                    <div id="kofi-widget-container" style="display: flex; align-items: center;">
                        <script src="https://storage.ko-fi.com/cdn/widget/Widget_2.js"></script>
                        <script>
                            try {
                                kofiwidget2.init('Support me on Ko-fi', '#72a4f2', 'I2I81CDN0L');
                                kofiwidget2.draw();
                            } catch (e) {
                                console.error('Ko-fi widget error:', e);
                            }
                        </script>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <p class="inspiration-note">Tree visualization inspired by <a href="https://metazooa.com/" target="_blank">Metazooa by Trainwreck Labs</a>.</p>
                <div class="tree-container" id="tree-container">
                    <!-- Phylogenetic tree visualization will be rendered here -->
                </div>
            </div>
            
            <div id="game-over-modal" class="modal hidden">
                <div class="modal-content glass-panel">
                    <h2 id="modal-title">You found it!</h2>
                    <p id="modal-message"></p>
                    <button id="play-again-btn" class="primary-btn">Play Again</button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
